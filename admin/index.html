<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin — Erasmus Verified</title>
        <meta name="robots" content="noindex,nofollow" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/css/admin.css" />
    </head>
    <body>
        <!-- VISTA LOGIN -->
        <div id="login-view" class="admin-login">
            <div class="admin-login__box">
                <!-- A: Logo block -->
                <div class="admin-login__logo">
                    <div class="admin-login__logo-icon">✦</div>
                    <div class="admin-login__logo-text">
                        <div class="admin-login__logo-name">Erasmus Verified</div>
                        <div class="admin-login__logo-sub">Panel de administración</div>
                    </div>
                </div>
                <div class="admin-field">
                    <label for="login-email">Email</label>
                    <input
                        id="login-email"
                        type="email"
                        autocomplete="username"
                        placeholder="tu@email.com"
                    />
                </div>
                <div class="admin-field">
                    <label for="login-password">Contraseña</label>
                    <input
                        id="login-password"
                        type="password"
                        autocomplete="current-password"
                        placeholder="••••••••"
                    />
                </div>
                <!-- B: Block button -->
                <button
                    id="login-btn"
                    type="button"
                    class="admin-btn admin-btn--primary admin-btn--block"
                >
                    Entrar
                </button>
                <p id="login-error" class="admin-error" role="alert"></p>
            </div>
        </div>

        <!-- VISTA PANEL -->
        <div id="panel-view" class="admin-panel" hidden>
            <!-- C: Branded header -->
            <header class="admin-header">
                <div class="admin-header__brand">
                    <div class="admin-header__brand-dot">✦</div>
                    <h1>Erasmus Verified</h1>
                </div>
                <button id="logout-btn" type="button" class="admin-btn admin-btn--ghost">
                    Cerrar sesión
                </button>
            </header>

            <main class="admin-main">
                <!-- SECCIÓN PARTNERS -->
                <section class="admin-section">
                    <div class="admin-section__header">
                        <!-- D: Partner count -->
                        <div class="admin-section__title-group">
                            <h2>Partners</h2>
                            <span id="partner-count" class="admin-count"></span>
                        </div>
                        <button
                            id="new-partner-btn"
                            type="button"
                            class="admin-btn admin-btn--primary"
                        >
                            + Nuevo partner
                        </button>
                    </div>
                    <div id="partners-table" class="admin-table-wrap"></div>
                </section>

                <!-- SECCIÓN CIUDADES -->
                <section class="admin-section">
                    <div class="admin-section__header">
                        <div class="admin-section__title-group">
                            <h2>Ciudades</h2>
                            <span id="cities-count" class="admin-count"></span>
                        </div>
                        <button
                            id="new-city-btn"
                            type="button"
                            class="admin-btn admin-btn--primary"
                        >
                            + Nueva ciudad
                        </button>
                    </div>
                    <div id="cities-table" class="admin-table-wrap"></div>
                </section>

                <!-- SECCIÓN MÉTRICAS -->
                <section class="admin-section">
                    <div class="admin-section__header">
                        <div class="admin-section__title-group">
                            <h2>Clics por partner</h2>
                            <span class="admin-count">últimos 30 días</span>
                        </div>
                    </div>
                    <!-- E: Metrics grid container -->
                    <div id="clicks-report" class="admin-metrics-grid"></div>
                </section>
            </main>
        </div>

        <!-- MODAL PARTNER -->
        <div id="partner-modal" class="admin-modal" hidden>
            <div class="admin-modal__backdrop"></div>
            <div class="admin-modal__box">
                <button type="button" class="admin-modal__close" id="modal-close">×</button>
                <!-- F: Modal header with subtitle -->
                <div class="admin-modal__header">
                    <h2 class="admin-modal__title" id="modal-title">Nuevo partner</h2>
                    <p class="admin-modal__subtitle" id="modal-subtitle"></p>
                </div>

                <!-- G: Field groups -->
                <div class="admin-field-group">
                    <div class="admin-field-group__title">Información básica</div>
                    <div class="admin-field">
                        <label
                            >ID <span class="admin-hint">(sin espacios, ej: p-nombre)</span></label
                        >
                        <input id="f-id" type="text" placeholder="p-nombre-ciudad" />
                    </div>
                    <div class="admin-field">
                        <label>Nombre</label>
                        <input id="f-name" type="text" />
                    </div>
                    <div class="admin-field">
                        <label>Categoría</label>
                        <select id="f-category">
                            <option value="nightlife">Nightlife</option>
                            <option value="housing">Alojamiento</option>
                            <option value="services">Servicios</option>
                            <option value="community">Comunidad</option>
                            <option value="travel">Viajes</option>
                        </select>
                    </div>
                    <div class="admin-field">
                        <label>Descripción</label>
                        <textarea id="f-description" rows="3"></textarea>
                    </div>
                </div>

                <div class="admin-field-group">
                    <div class="admin-field-group__title">Ubicación</div>
                    <div class="admin-field">
                        <label>País</label>
                        <input id="f-pais" type="text" value="España" />
                    </div>
                    <div class="admin-field">
                        <label>Ciudad</label>
                        <input id="f-ciudad" type="text" value="Bilbao" />
                    </div>
                </div>

                <div class="admin-field-group">
                    <div class="admin-field-group__title">Coordenadas y configuración</div>
                    <div class="admin-field admin-field--row">
                        <div class="admin-field">
                            <label>Latitud</label>
                            <input id="f-lat" type="number" step="any" />
                        </div>
                        <div class="admin-field">
                            <label>Longitud</label>
                            <input id="f-lng" type="number" step="any" />
                        </div>
                    </div>
                    <div class="admin-field">
                        <label
                            >Prioridad
                            <span class="admin-hint">(mayor = aparece antes)</span></label
                        >
                        <input id="f-priority" type="number" value="0" />
                    </div>
                    <div class="admin-field admin-field--check">
                        <input id="f-active" type="checkbox" checked />
                        <label for="f-active">Activo</label>
                    </div>
                </div>

                <!-- H: Links section header -->
                <hr class="admin-divider" />
                <div class="admin-links-header">
                    <h3>Links</h3>
                    <button
                        type="button"
                        id="add-link-btn"
                        class="admin-btn admin-btn--sm admin-btn--ghost"
                    >
                        + Añadir link
                    </button>
                </div>
                <div id="links-container"></div>

                <div class="admin-modal__actions">
                    <button type="button" id="modal-cancel" class="admin-btn admin-btn--ghost">
                        Cancelar
                    </button>
                    <button type="button" id="modal-save" class="admin-btn admin-btn--primary">
                        Guardar
                    </button>
                </div>
            </div>
        </div>

        <!-- MODAL CIUDAD -->
        <div id="city-modal" class="admin-modal" hidden>
            <div class="admin-modal__backdrop"></div>
            <div class="admin-modal__box">
                <div class="admin-modal__header">
                    <div>
                        <h2 class="admin-modal__title" id="city-modal-title">Nueva ciudad</h2>
                        <p class="admin-modal__subtitle" id="city-modal-subtitle">
                            Rellena los datos de la ciudad
                        </p>
                    </div>
                    <button
                        type="button"
                        class="admin-modal__close"
                        id="city-modal-close"
                        aria-label="Cerrar"
                    >
                        ×
                    </button>
                </div>

                <div class="admin-field-group">
                    <div class="admin-field-group__title">Información básica</div>
                    <div class="admin-field">
                        <label>ID <span class="admin-hint">(sin espacios, ej: bilbao)</span></label>
                        <input id="cf-id" type="text" placeholder="bilbao" />
                    </div>
                    <div class="admin-field">
                        <label>Nombre</label>
                        <input id="cf-name" type="text" placeholder="Bilbao" />
                    </div>
                    <div class="admin-field admin-field--row">
                        <div>
                            <label>País</label>
                            <input id="cf-country" type="text" placeholder="España" />
                        </div>
                        <div>
                            <label>Bandera <span class="admin-hint">(emoji)</span></label>
                            <input id="cf-flag" type="text" placeholder="🇪🇸" />
                        </div>
                    </div>
                    <div class="admin-field">
                        <label>Descripción <span class="admin-hint">(texto del bento)</span></label>
                        <textarea id="cf-description" rows="2"></textarea>
                    </div>
                    <div class="admin-field">
                        <label>URL imagen</label>
                        <input id="cf-image" type="text" placeholder="https://..." />
                    </div>
                    <div class="admin-field admin-field--row">
                        <div>
                            <label>Prioridad</label>
                            <input id="cf-priority" type="number" value="0" />
                        </div>
                        <div class="admin-field--check" style="margin-top: 24px">
                            <input id="cf-active" type="checkbox" />
                            <label for="cf-active">Activa</label>
                        </div>
                    </div>
                </div>

                <hr class="admin-divider" />
                <div class="admin-links-header">
                    <span class="admin-links-title">Grupos de la ciudad</span>
                    <button
                        type="button"
                        id="add-group-btn"
                        class="admin-btn admin-btn--ghost admin-btn--sm"
                    >
                        + Añadir grupo
                    </button>
                </div>
                <div id="groups-container"></div>

                <div class="admin-modal__actions">
                    <button type="button" id="city-modal-cancel" class="admin-btn admin-btn--ghost">
                        Cancelar
                    </button>
                    <button type="button" id="city-modal-save" class="admin-btn admin-btn--primary">
                        Guardar
                    </button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
        <script src="/src/js/lib/supabaseClient.js"></script>
        <script src="/src/js/admin.js"></script>
    </body>
</html>
