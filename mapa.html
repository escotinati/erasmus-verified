<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa — Erasmus Verified</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/styles.css?" />
    <style>
        /* Alta especificidad (#map > cualquier regla de clase) para garantizar
               la altura correcta aunque styles.css esté cacheado en versión antigua */
        
        #map.map-canvas {
            height: calc(100vh - 73px);
            height: calc(100dvh - 73px);
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="logo">Erasmus<span class="logo-dot">Verified</span></a>
            <nav class="topbar-nav" id="mainNav">
                <a href="index.html">Inicio</a>
                <a href="ciudades-todas.html">Ciudades</a>
                <a href="servicios.html">Servicios</a>
                <a href="viajes.html">Viajes</a>
                <a href="https://erasmusparties.org" target="_blank" rel="noopener noreferrer" class="nav-parties">🎉 Fiestas ↗</a>
            </nav>
        </div>
        <nav class="breadcrumb">
            <a href="index.html">Inicio</a>
            <span class="sep">/</span>
            <a id="breadcrumbPaisLink" href="#"><span id="breadcrumbPais">País</span></a>
            <span class="sep">/</span>
            <a id="breadcrumbCiudadLink" href="#"><span id="breadcrumbCiudad">Ciudad</span></a>
            <span class="sep">/</span>
            <span class="current">Mapa</span>
        </nav>
        <div class="topbar-right">
            <a href="#" class="back-btn" id="backLink">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                <span id="backLinkText">Volver</span>
            </a>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menú">
                    <span></span><span></span><span></span>
                </button>
        </div>
    </header>

    <main class="map-page-main map-with-list">
        <div id="map" class="map-canvas"></div>
        <aside id="partners-list" class="partners-list"></aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/data.js"></script>
    <script src="js/geocoder.js"></script>
    <script src="js/map-helpers.js?v=2"></script>
    <script src="js/partners.js?v=2"></script>
    <script src="js/mapPartners.js?v=2"></script>
    <script src="js/cityMap.js"></script>
    <script src="js/mapa.js?v=2"></script>

    <!-- ── MOBILE NAV OVERLAY ─────────────────────────────── -->
    <div class="mobile-nav" id="mobileNav" aria-hidden="true">
        <button class="mobile-nav-close" id="mobileNavClose" aria-label="Cerrar menú">
                <span class="material-symbols-outlined">close</span>
            </button>
        <nav class="mobile-nav-links">
            <a href="index.html">Inicio</a>
            <a href="ciudades-todas.html">Ciudades</a>
            <a href="servicios.html">Servicios</a>
            <a href="viajes.html">Viajes</a>
            <a href="https://erasmusparties.org" target="_blank" rel="noopener noreferrer" class="nav-parties">🎉 Fiestas ↗</a>
        </nav>
    </div>

    <!-- ── APP BOTTOM NAV (móvil) ────────────────────────── -->
    <nav class="app-bottom-nav" id="appBottomNav" aria-label="Navegación principal">
        <a href="ciudades-todas.html" class="app-bottom-nav-item">
            <span class="material-symbols-outlined">location_city</span>
            <span>Ciudades</span>
        </a>
        <a href="servicios.html" class="app-bottom-nav-item">
            <span class="material-symbols-outlined">storefront</span>
            <span>Servicios</span>
        </a>
        <a href="viajes.html" class="app-bottom-nav-item">
            <span class="material-symbols-outlined">flight</span>
            <span>Viajes</span>
        </a>
        <a href="https://erasmusparties.org" target="_blank" rel="noopener noreferrer" class="app-bottom-nav-item app-bottom-nav-item--parties">
            <span class="material-symbols-outlined">nightlife</span>
            <span>Fiestas</span>
        </a>
    </nav>
    <script>
        /* ── Hamburger + ítem activo (nav global + bottom-nav) ── */
        (function() {
            var btn = document.getElementById('hamburgerBtn');
            var mnav = document.getElementById('mobileNav');
            var close = document.getElementById('mobileNavClose');

            function openNav() {
                btn.classList.add('is-open');
                mnav.classList.add('is-open');
                mnav.removeAttribute('aria-hidden');
            }

            function closeNav() {
                btn.classList.remove('is-open');
                mnav.classList.remove('is-open');
                mnav.setAttribute('aria-hidden', 'true');
            }
            if (btn && mnav) {
                btn.addEventListener('click', function() {
                    mnav.classList.contains('is-open') ? closeNav() : openNav();
                });
                if (close) close.addEventListener('click', closeNav);
                mnav.querySelectorAll('a:not(.nav-parties)').forEach(function(a) {
                    a.addEventListener('click', closeNav);
                });
            }
            var page = (window.location.pathname.split('/').pop() || 'index.html').split('?')[0] || 'index.html';
            document.querySelectorAll('.topbar-nav a, .mobile-nav-links a').forEach(function(a) {
                var href = (a.getAttribute('href') || '').split('?')[0];
                if (href && !href.startsWith('http') && href === page) a.classList.add('is-active');
            });
            document.querySelectorAll('.app-bottom-nav .app-bottom-nav-item').forEach(function(a) {
                var href = (a.getAttribute('href') || '').split('?')[0];
                if (href && !href.startsWith('http') && href === page) a.classList.add('app-bottom-nav-item--active');
            });
        })();
    </script>
</body>

</html>
