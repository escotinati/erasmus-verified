<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mapa — Erasmus Parties</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />
        <link rel="stylesheet" href="css/styles.css?v=5" />
        <style>
            /* Alta especificidad (#map > cualquier regla de clase) para garantizar
               la altura correcta aunque styles.css esté cacheado en versión antigua */
            #map.map-canvas {
                height: calc(100vh - 73px);
                height: calc(100dvh - 73px);
            }
        </style>
    </head>

    <body>
        <header class="topbar">
            <a href="index.html" class="logo">Erasmus<span class="logo-dot">Parties</span></a>
            <nav class="breadcrumb">
                <a href="index.html">Inicio</a>
                <span class="sep">/</span>
                <a id="breadcrumbPaisLink" href="#"><span id="breadcrumbPais">País</span></a>
                <span class="sep">/</span>
                <a id="breadcrumbCiudadLink" href="#"><span id="breadcrumbCiudad">Ciudad</span></a>
                <span class="sep">/</span>
                <span class="current">Mapa</span>
            </nav>
            <a href="#" class="back-btn" id="backLink">
                <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                >
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                <span id="backLinkText">Volver</span>
            </a>
        </header>

        <main class="map-page-main map-with-list">
            <div id="map" class="map-canvas"></div>
            <aside id="partners-list" class="partners-list"></aside>
        </main>

        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>
        <script src="js/data.js"></script>
        <script src="js/geocoder.js"></script>
        <script src="js/map-helpers.js?v=2"></script>
        <script src="js/partners.js?v=2"></script>
        <script src="js/mapPartners.js?v=2"></script>
        <script src="js/cityMap.js"></script>
        <script src="js/mapa.js?v=2"></script>
    </body>
</html>
